<!DOCTYPE html>
<html>
<head>
    <title>Список дел</title>
    <style>
        body { 
            font-family: Arial; 
            margin: 40px; 
            background-color: #f0f0f0;
        }
        h1 { 
            color: #0066cc;
        }
        .done { 
            text-decoration: line-through; 
            color: gray; 
        }
        ul { 
            list-style: none; 
            padding: 0; 
        }
        li { 
            margin: 10px 0; 
            background-color: white;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-info {
            flex-grow: 1;
        }
        .task-text {
            font-size: 16px;
        }
        .task-date {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .delete-btn {
            background-color: #ff4444;
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 3px;
            margin-left: 10px;
        }
        .delete-btn:hover {
            background-color: #cc0000;
        }
        .clear-btn {
            background-color: #ff8800;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .clear-btn:hover {
            background-color: #cc6600;
        }
        .add-form {
            margin-top: 20px;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
        }
        input[type="text"] {
            padding: 8px;
            width: 300px;
            margin-right: 10px;
        }
        button {
            padding: 8px 15px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0052a3;
        }
    </style>
</head>
<body>
    <h1>Мои задачи</h1>
    
    <a href="/clear_all" class="clear-btn" onclick="return confirm('Вы уверены, что хотите удалить все задачи?')">Очистить всё</a>
    
    <ul>
    {% for task in tasks %}
        <li>
            <div class="task-info">
                <div class="task-text">{{ task.text }}</div>
                <div class="task-date">Создано: {{ task.date }}</div>
            </div>
            <a href="/delete/{{ loop.index0 }}" class="delete-btn">Удалить</a>
        </li>
    {% endfor %}
    </ul>

    <div class="add-form">
        <h2>Добавить задачу</h2>
        <form method="POST" action="/add">
            <input type="text" name="task" placeholder="Новая задача" required>
            <button type="submit">Добавить</button>
        </form>
    </div>

</body>
</html>
